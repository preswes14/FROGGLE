name: Deploy Demo to Steam

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download demo release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p staging
          gh release download demo-latest --pattern "*.exe" --dir staging || echo "No Windows build"
          gh release download demo-latest --pattern "*.AppImage" --dir staging || echo "No Linux build"
          gh release download demo-latest --pattern "*.zip" --dir staging || echo "No Mac build"
          echo "=== Downloaded files ==="
          ls -la staging/

      - name: Organize content with stable filenames
        run: |
          mkdir -p content/windows content/linux content/mac

          WIN_EXE=$(find staging -name "*.exe" | head -1)
          if [ -n "$WIN_EXE" ]; then
            cp "$WIN_EXE" content/windows/FROGGLE.exe
          fi

          LINUX_APP=$(find staging -name "*.AppImage" | head -1)
          if [ -n "$LINUX_APP" ]; then
            cp "$LINUX_APP" content/linux/FROGGLE.AppImage
            chmod +x content/linux/FROGGLE.AppImage
          fi

          MAC_ZIP=$(find staging -name "*.zip" | head -1)
          if [ -n "$MAC_ZIP" ]; then
            unzip -o "$MAC_ZIP" -d content/mac/
          fi

          echo "=== Final content structure ==="
          find content -type f | head -30

      - name: Install SteamCMD
        uses: CyberAndrii/setup-steamcmd@v1

      - name: Setup Steam authentication
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          mkdir -p ~/Steam/config ~/.steam/config ~/.local/share/Steam/config
          echo "$STEAM_CONFIG_VDF" | base64 -d > ~/Steam/config/config.vdf
          cp ~/Steam/config/config.vdf ~/.steam/config/config.vdf
          cp ~/Steam/config/config.vdf ~/.local/share/Steam/config/config.vdf

      - name: Deploy demo to Steam
        run: |
          steamcmd +login ${{ secrets.STEAM_USERNAME }} +run_app_build $(pwd)/steamcmd/app_build_demo.vdf +quit
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
