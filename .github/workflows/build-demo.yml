name: Build Demo (All Platforms)

# Manual trigger only — demo builds are intentional, not automatic
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enable DEMO_MODE
        run: sed -i "s/const DEMO_MODE = false/const DEMO_MODE = true/" src/constants.js

      - name: Build game (combine source files)
        run: ./build.sh --no-bump

      - name: Build Linux
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-builds-linux
          path: dist/*.AppImage
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enable DEMO_MODE
        shell: bash
        run: sed -i "s/const DEMO_MODE = false/const DEMO_MODE = true/" src/constants.js

      - name: Build game (combine source files)
        shell: bash
        run: ./build.sh --no-bump

      - name: Build Windows
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-builds-windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enable DEMO_MODE
        run: sed -i '' "s/const DEMO_MODE = false/const DEMO_MODE = true/" src/constants.js

      - name: Build game (combine source files)
        run: ./build.sh --no-bump

      - name: Build macOS
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-builds-mac
          path: dist/*.zip
          retention-days: 30

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Delete old demo release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view demo-latest --repo ${{ github.repository }} --json assets -q '.assets[].name' 2>/dev/null | while read -r asset; do
            echo "Deleting $asset..."
            gh release delete-asset demo-latest "$asset" --repo ${{ github.repository }} -y || true
          done

      - name: Create/Update Demo Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: demo-latest
          name: Latest Demo Build
          files: |
            dist/*.AppImage
            dist/*.exe
            dist/*.zip
          prerelease: true
          body: |
            FROGGLE Demo build — floors 0-5 (through the Orc Wall).
            Built from main with DEMO_MODE enabled.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
