name: Deploy to Steam

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Steam branch to deploy to'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - default

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p staging
          gh release download latest --pattern "*.exe" --dir staging || echo "No Windows build"
          gh release download latest --pattern "*.AppImage" --dir staging || echo "No Linux build"
          gh release download latest --pattern "*.zip" --dir staging || echo "No Mac build"
          echo "=== Downloaded files ==="
          ls -la staging/

      - name: Organize content with stable filenames
        run: |
          mkdir -p content/windows content/linux content/mac

          # Windows: rename versioned .exe to stable name
          WIN_EXE=$(find staging -name "*.exe" | head -1)
          if [ -n "$WIN_EXE" ]; then
            cp "$WIN_EXE" content/windows/FROGGLE.exe
            echo "Windows: $(ls -la content/windows/)"
          else
            echo "WARNING: No Windows .exe found"
          fi

          # Linux: rename versioned .AppImage to stable name, make executable
          LINUX_APP=$(find staging -name "*.AppImage" | head -1)
          if [ -n "$LINUX_APP" ]; then
            cp "$LINUX_APP" content/linux/FROGGLE.AppImage
            chmod +x content/linux/FROGGLE.AppImage
            echo "Linux: $(ls -la content/linux/)"
          else
            echo "ERROR: No Linux AppImage found!"
            exit 1
          fi

          # Mac: extract .app from zip
          MAC_ZIP=$(find staging -name "*.zip" | head -1)
          if [ -n "$MAC_ZIP" ]; then
            unzip -o "$MAC_ZIP" -d content/mac/
            echo "Mac: $(ls -la content/mac/)"
          else
            echo "WARNING: No Mac .zip found"
          fi

          echo "=== Final content structure ==="
          find content -type f | head -30

      - name: Deploy to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 4333900
          buildDescription: ${{ github.sha }}
          rootPath: content
          depot1Path: windows
          depot2Path: mac
          depot3Path: linux
          # releaseBranch removed for testing — set build live manually in Steamworks
